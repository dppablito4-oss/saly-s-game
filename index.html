<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para alguien especial - De Samuel</title>
    <style>
        :root {
            --primary: #ff4b6b;
            --secondary: #6c5ce7;
            --bg: #0f172a;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        .icon { font-size: 60px; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 10px var(--primary)); }
        h1 { font-size: 1.4rem; margin-bottom: 15px; color: var(--primary); }
        p { font-size: 1.05rem; line-height: 1.6; opacity: 0.9; }
        .btn-box { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 75, 107, 0.4); }
        .rain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>

<div class="rain" id="rain-effect"></div>

<div id="card">
    <div id="content">
        <span class="icon">🌧️</span>
        <h1>Misión: Punchao</h1>
        <p>Sé que el camino está lleno de barro, hace un frío terrible y la lluvia no para...</p>
        <div class="btn-box">
            <button onclick="changeScene('apology')">Seguir leyendo...</button>
        </div>
    </div>
</div>

<script>
    const scenes = {
        apology: {
            icon: "🤦‍♂️",
            title: "Samuel la malogró...",
            text: "En vez de darte el abrazo virtual que necesitabas, me puse en modo 'profesor' y te dije que debías preverlo. Fui un tonto, lo admito.",
            btns: [{ text: "Te escucho, Samuel", next: 'remedy' }]
        },
        remedy: {
            icon: "☕",
            title: "Tu kit de supervivencia",
            text: "Como no puedo estar ahí para secarte la ropa o llevarte un paraguas, te envío este café virtual y mucha calidez para que no te enfermes.",
            btns: [{ text: "Aceptar kit y seguir", next: 'question' }]
        },
        question: {
            icon: "💝",
            title: "¿Me perdonas?",
            text: "Prometo que la próxima vez solo me preocuparé por saber si estás bien y cómo puedo hacerte sonreír. ¿Hacemos las paces?",
            btns: [
                { text: "Sí, te perdono Samuel ❤️", next: 'final' },
                { text: "Mmm, déjame pensarlo...", next: 'think' }
            ]
        },
        think: {
            icon: "🤔",
            title: "Vale, lo entiendo",
            text: "El barro de Punchao se quita con agua, pero mis palabras hirientes necesitan un poquito más de tiempo. ¿Me das otra oportunidad?",
            btns: [{ text: "Está bien, te perdono", next: 'final' }]
        },
        final: {
            icon: "✨",
            title: "¡Gracias!",
            text: "Ahora descansa, abrígate mucho y no dejes que la lluvia te quite el ánimo. Aquí te espero con un apapacho real.",
            btns: []
        }
    };

    function changeScene(key) {
        const s = scenes[key];
        const content = document.getElementById('content');
        content.innerHTML = `
            <span class="icon">${s.icon}</span>
            <h1>${s.title}</h1>
            <p>${s.text}</p>
            <div class="btn-box">
                ${s.btns.map(b => `<button onclick="changeScene('${b.next}')">${b.text}</button>`).join('')}
            </div>
        `;
    }

    // Efecto de lluvia
    const rainContainer = document.getElementById('rain-effect');
    for(let i=0; i<30; i++) {
        const drop = document.createElement('div');
        drop.style.cssText = `
            position: absolute;
            width: 2px;
            height: 15px;
            background: rgba(255,255,255,0.2);
            top: ${Math.random()*100}%;
            left: ${Math.random()*100}%;
            animation: fall ${Math.random()*1 + 0.5}s linear infinite;
        `;
        rainContainer.appendChild(drop);
    }

    const style = document.createElement('style');
    style.innerHTML = `@keyframes fall { to { transform: translateY(100vh); } }`;
    document.head.appendChild(style);
</script>

</body>
</html>
