<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Quest: El Distrito Remoto</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --text-color: #e0e0e0;
            --accent-color: #ff4b2b;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            max-width: 600px;
            padding: 20px;
            border: 2px solid var(--accent-color);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.3);
            text-align: center;
        }
        .message { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        button:hover {
            background: var(--accent-color);
            color: white;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="scene-content">
        <p class="message" id="text-display">Cargando aventura...</p>
        <div class="choices" id="choice-buttons"></div>
    </div>
</div>

<script>
    const story = {
        start: {
            text: "Te encuentras en un distrito remoto. El cielo se oscurece y empieza a caer una lluvia torrencial. Tienes frío y olvidaste tu cambio de ropa. ¿Qué haces?",
            choices: [
                { text: "Buscar refugio y quejarme", next: "complain" },
                { text: "Llamar a Pablo para que me regañe", next: "pablo_scold" }
            ]
        },
        complain: {
            text: "Estás bajo un techo, pero el frío aumenta. De pronto, aparece un mensaje en tu celular: '¿Ya ves? Te lo dije'. Sientes un golpe crítico en tus sentimientos. (-50 HP)",
            choices: [
                { text: "Perdonar al despistado de Pablo", next: "forgive" },
                { text: "Congelarme de orgullo", next: "freeze" }
            ]
        },
        pablo_scold: {
            text: "Pablo dice: 'Debiste preverlo...'. La frialdad de sus palabras es más fuerte que la lluvia. Te das cuenta de que tiene razón, pero ¡qué hiriente!",
            choices: [
                { text: "Aceptar las disculpas (él ya se siente mal)", next: "forgive" },
                { text: "Ignorarlo y buscar un chocolate caliente", next: "chocolate" }
            ]
        },
        freeze: {
            text: "Te has convertido en una estatua de hielo. Pablo viajará hasta allá con una secadora de pelo para descongelarte y pedirte perdón mil veces.",
            choices: [{ text: "Reiniciar destino", next: "start" }]
        },
        chocolate: {
            text: "Encuentras chocolate, pero no tiene azúcar. Como el comentario de Pablo. Al final, ambos saben que se quieren a pesar de la lluvia.",
            choices: [{ text: "Ver mensaje final", next: "forgive" }]
        },
        forgive: {
            text: "¡LOGRO DESBLOQUEADO: PERDÓN OBTENIDO! <br><br> Prometo que la próxima vez, en lugar de decirte 'te lo dije', estaré ahí con una casaca lista o al menos un mensaje que te de calorcito. ¿Me perdonas?",
            choices: [{ text: "Sí, acepto (y traeré paraguas)", next: "finish" }]
        },
        finish: {
            text: "❤️ Misión cumplida. Vuelve pronto, que aquí te espera un café (y cero regaños).",
            choices: []
        }
    };

    function loadScene(sceneKey) {
        const scene = story[sceneKey];
        const textDisplay = document.getElementById('text-display');
        const choiceButtons = document.getElementById('choice-buttons');

        textDisplay.innerHTML = scene.text;
        choiceButtons.innerHTML = '';

        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice.text;
            btn.onclick = () => loadScene(choice.next);
            choiceButtons.appendChild(btn);
        });
    }

    loadScene('start');
</script>

</body>
</html>
